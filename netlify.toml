# Netlify build settings (so Netlify never has to guess).
# Works whether you deploy via GitHub or drag-and-drop.

[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — send every route to index.html so /paper-1, /paper-2,
# /mock-tests work on refresh and direct links (prevents 404s).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
