<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FFFFFF" />
    <title>Polity Made Simple | UGC NET Political Science</title>
    <meta
      name="description"
      content="UGC NET Political Science study material, mock tests, PYQs and strategy for December 2026."
    />

    <!-- Fonts: Manrope (text) + JetBrains Mono (labels), only the weights we use -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <!--
      Apply the saved theme BEFORE React loads so there is no
      light/dark "flash" on refresh. Defaults to light mode for new visitors.
    -->
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        var root = document.documentElement;
        if (saved === "dark") {
          root.classList.add("dark");
          root.classList.remove("light");
        } else {
          root.classList.add("light");
          root.classList.remove("dark"); // light is the default
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
