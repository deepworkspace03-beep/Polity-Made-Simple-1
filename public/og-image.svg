      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0F1B2B"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2856C4"/>
      <stop offset="1" stop-color="#12A078"/>
