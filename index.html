<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="canonical" href="https://www.politymadesimple.com/" />
    <meta name="theme-color" content="#C9D4E3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B0F13" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="UGC NET / JRF Political Science study material — notes, PYQs, mock tests, current affairs and exam strategy for December 2026. Also available in Hindi." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Political Science Made Simple" />
    <title>Polity Made Simple | UGC NET Political Science</title>

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.politymadesimple.com/" />
    <meta property="og:site_name" content="Polity Made Simple" />
    <meta property="og:title" content="Polity Made Simple | UGC NET Political Science" />
    <meta property="og:description" content="Free UGC NET / JRF Political Science notes, mock tests and PYQ solutions — by The JRF Club Initiative." />
    <meta property="og:image" content="https://www.politymadesimple.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Polity Made Simple | UGC NET Political Science" />
    <meta name="twitter:description" content="Free UGC NET / JRF Political Science notes, mock tests and PYQ solutions." />
    <meta name="twitter:image" content="https://www.politymadesimple.com/og-image.png" />

    <!-- Structured data: helps search engines associate this site with a
         named organisation + logo (site can otherwise look "unbranded" in
         search results for a brand-new domain). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Polity Made Simple",
        "url": "https://www.politymadesimple.com/",
        "logo": "https://www.politymadesimple.com/apple-touch-icon.png",
        "description": "UGC NET / JRF Political Science study material — notes, PYQs, mock tests, current affairs and exam strategy."
      }
    </script>

    <!-- Fonts: Manrope (text) + JetBrains Mono (labels), only the weights we use -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <!--
      Google Analytics 4 (gtag.js). Loaded async so it never blocks
      rendering. `send_page_view: false` disables gtag's own automatic
      pageview so it doesn't double-count alongside the React Router
      page-view tracking in src/lib/analytics.ts, which fires on every
      SPA navigation (including the first one).
    -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q9WQB602V2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-Q9WQB602V2", { send_page_view: false });
    </script>

    <!--
      Apply the saved theme BEFORE React loads so there is no
      light/dark "flash" on refresh. Defaults to light mode for new visitors.
    -->
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        var root = document.documentElement;
        if (saved === "dark") {
          root.classList.add("dark");
          root.classList.remove("light");
        } else {
          root.classList.add("light");
          root.classList.remove("dark"); // light is the default
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
