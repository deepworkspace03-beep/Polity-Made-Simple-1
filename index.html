<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Address-bar tint matches the page background in each theme -->
    <meta name="theme-color" content="#D2DCE8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0B0F13" media="(prefers-color-scheme: dark)" />
    <title>Polity Made Simple | UGC NET Political Science</title>
    <meta name="description" content="UGC NET Political Science study material, mock tests, PYQs and strategy for December 2026." />

    <!-- Open Graph / social cards (use property=, not name=) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Polity Made Simple" />
    <meta property="og:title" content="Polity Made Simple | UGC NET Political Science" />
    <meta property="og:description" content="Free UGC NET Political Science notes, mock tests, and PYQ solutions." />
    <meta property="og:image" content="/favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Polity Made Simple | UGC NET Political Science" />
    <meta name="twitter:description" content="Free UGC NET Political Science notes, mock tests, and PYQ solutions." />

    <!-- Fonts: Manrope (text) + JetBrains Mono (labels), only the weights we use -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <!--
      Apply the saved theme BEFORE React loads so there is no
      light/dark "flash" on refresh. Defaults to light mode for new visitors.
    -->
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        var root = document.documentElement;
        if (saved === "dark") {
          root.classList.add("dark");
          root.classList.remove("light");
        } else {
          root.classList.add("light");
          root.classList.remove("dark"); // light is the default
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
